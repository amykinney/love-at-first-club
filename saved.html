<!DOCTYPE html>
<html>
<head>
  <title>Saved</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <h2>Saved Clubs</h2>
  <a href="discover.html">Back</a>
</div>

<div id="savedList"></div>

<script>
const saved = JSON.parse(localStorage.getItem("saved") || "[]");

document.getElementById("savedList").innerHTML =
  saved.map(s => `<div class="saved-card">${s}</div>`).join("");
</script>

</body>
</html>
