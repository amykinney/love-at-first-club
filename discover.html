<!DOCTYPE html>
<html>
<head>
  <title>Discover - Love at First Club</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <h2>Love at First Club</h2>
  <div>
    <a href="discover.html">Discover</a>
    <a href="saved.html">Saved</a>
    <a href="profile.html">Profile</a>
  </div>
</div>

<div class="app-grid">

  <!-- SIDEBAR AI CHAT -->
  <div class="chat">
    <h3>AI Assistant</h3>
    <div id="chatBox"></div>
    <input id="chatInput" placeholder="Ask why this match...">
    <button onclick="sendChat()">Send</button>
  </div>

  <!-- MAIN SWIPE -->
  <div class="swipe-area">

    <div class="card" id="card">
      <img id="img">
      <h2 id="name"></h2>
      <p id="desc"></p>

      <div class="meta">
        <p id="time"></p>
        <p id="location"></p>
      </div>

      <div class="match" id="match"></div>
    </div>

    <div class="buttons">
      <button onclick="swipe(false)">✖</button>
      <button onclick="swipe(true)">❤</button>
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="panel">
    <h3>Your Stats</h3>
    <p>❤️ <span id="likes">0</span></p>
    <p>❌ <span id="passes">0</span></p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
